<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>EveryTriv — link</title>
	<!--
		Public demo: set FRONTEND_DEMO_URL below to your HTTPS tunnel (Docker client :3000).
		Local play: open http://localhost:3000 on the host that runs Docker — not this page.
	-->
	<style>
		body { font-family: system-ui, sans-serif; padding: 1rem; max-width: 40rem; line-height: 1.5; }
		code { background: #f4f4f4; padding: 0.1rem 0.35rem; border-radius: 4px; }
		#loading { margin: 0; }
		#panel { display: none; }
	</style>
</head>
<body>
	<p id="loading">Loading demo link…</p>
	<div id="panel" role="status">
		<p><strong>No public demo URL configured.</strong></p>
		<p>
			In <code>index.html</code>, set <code>var FRONTEND_DEMO_URL = "https://…";</code> to your tunnel (same as
			<code>CLIENT_URL</code>). Commit and push to <code>main</code>, or run
			<code>sync-demo-redirect.ps1</code> from the EveryTriv monorepo.
		</p>
		<p>
			<a href="https://github.com/IsraelRub/EveryTriv">EveryTriv — source</a>
			·
			<a href="https://github.com/IsraelRub/everytriv-link">everytriv-link</a>
		</p>
	</div>
	<script>
		(function () {
			/* Sync script replaces the empty string with a JSON-escaped HTTPS URL. */
			var FRONTEND_DEMO_URL = "";
			function isAllowedFrontendUrl(u) {
				if (!u || u.indexOf('https://') !== 0) return false;
				try {
					var parsed = new URL(u);
					if (parsed.protocol !== 'https:') return false;
					var h = parsed.hostname.toLowerCase();
					if (h === 'localhost' || h === '127.0.0.1' || h === '[::1]') return false;
					return true;
				} catch (e) {
					return false;
				}
			}
			var loading = document.getElementById('loading');
			var panel = document.getElementById('panel');
			function fail() {
				if (loading) loading.style.display = 'none';
				if (panel) panel.style.display = 'block';
			}
			if (!isAllowedFrontendUrl(FRONTEND_DEMO_URL)) {
				fail();
				return;
			}
			location.replace(FRONTEND_DEMO_URL);
		})();
	</script>
</body>
</html>
